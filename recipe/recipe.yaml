schema_version: 1

context:
  name: vasprun-xml
  version: 1.0.4

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/vasprun-xml-${{ version }}.tar.gz
  sha256: 8862c032b8138ca2532d427ff07f5ddad48c61842f908ba9fe6938edbacb1390

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - lxml >=4.2.5
    - pandas >=0.23.4
    - numpy >=1.13.3
    - scipy >=1.1.0
    - matplotlib-base >=2.0.0
    - tabulate

tests:
  - python:
      imports:
        - vasprun
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: A python package for quick analysis of vasp calculation
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/qzhu2017/vasprun

extra:
  recipe-maintainers:
    - jan-janssen
